version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_sneakers
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo-data:/data/db

  api:
    build: .
    container_name: sneakers_api
    ports:
      - "3000:3000"
    environment:
      MONGO_URL: mongodb://admin:admin@mongodb:27017/sneakers-api?authSource=admin
    depends_on:
      - mongodb

volumes:
  mongo-data: